name: Build, Push and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Step 1 - Build & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-nextjs-app:latest

  deploy:
    name: Step 2 - Deploy to EC2
    runs-on: self-hosted

    needs: build-and-push

    steps:
      - name: Deploy container
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/my-nextjs-app:latest
          docker stop nextjs-app || true
          docker rm nextjs-app || true
          docker run -d --name nextjs-app -p 80:3000 ghcr.io/${{ github.repository_owner }}/my-nextjs-app:latest
